name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate monorepo structure
        run: |
          echo "✓ Validating MFE monorepo structure..."
          test -d apps/shell && echo "✓ Shell app exists"
          test -d apps/dashboard && echo "✓ Dashboard MFE exists"
          test -d apps/checkout && echo "✓ Checkout MFE exists"
          test -d apps/settings && echo "✓ Settings MFE exists"
          test -d packages/shared-types && echo "✓ Shared types package exists"
          test -d packages/shared-components && echo "✓ Shared components package exists"
          test -f README.md && echo "✓ README documentation exists"
          test -f nx.json && echo "✓ Nx configuration exists"
          test -f .yarnrc.yml && echo "✓ Yarn v4 configuration exists"
          test -f pnpm-workspace.yaml && echo "✓ Workspace definition exists"
          echo ""
          echo "✅ All validations passed!"
          echo "Repository is ready for development with Yarn v4"
