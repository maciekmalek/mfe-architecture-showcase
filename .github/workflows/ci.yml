name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Yarn v4
        run: yarn set version latest

      - name: Install dependencies
        run: yarn install

      - name: Validate structure
        run: |
          echo "✓ Monorepo structure validated"
          test -d apps/shell && echo "✓ Shell app exists"
          test -d apps/dashboard && echo "✓ Dashboard app exists"
          test -d apps/checkout && echo "✓ Checkout app exists"
          test -d apps/settings && echo "✓ Settings app exists"
          test -d packages/shared-types && echo "✓ Shared types package exists"
          test -d packages/shared-components && echo "✓ Shared components package exists"
          test -f README.md && echo "✓ README exists"
          test -f nx.json && echo "✓ Nx config exists"
          echo "All validations passed!"
