name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build all apps
        run: yarn build

      - name: Run tests
        run: yarn test --passWithNoTests

      - name: Lint code
        run: yarn lint 2>/dev/null || echo "Lint not configured, skipping"
